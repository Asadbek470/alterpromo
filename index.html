<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alter Wheel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🎡 Alter акция</h1>

<button onclick="register()">Регистрация</button>
<button onclick="spin()">Крутить</button>

<h2 id="user"></h2>

<div class="arrow">▼</div>
<canvas id="wheel" width="300" height="300"></canvas>

<h3 id="result"></h3>

<h3>🏆 Победители</h3>
<div id="winners"></div>

</div>

<!-- ЧЕК -->
<div id="checkModal">
  <div class="check">
    <h3>🧾 Чек</h3>
    <p id="checkText"></p>
    <canvas id="qr"></canvas>
    <button onclick="closeCheck()">Закрыть</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="script.js"></script>

</body>
</html>
